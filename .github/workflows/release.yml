name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  BINARY_NAME: cmdp
  CARGO_TERM_COLOR: always

jobs:
  checks:
    name: Release checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --locked --all-features

  build:
    name: Build ${{ matrix.target }}
    needs: checks
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            rpm_arch: x86_64
            archive: tar.gz
            apt_packages: ""
            linker_env: ""
            linker: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            rpm_arch: aarch64
            archive: tar.gz
            apt_packages: gcc-aarch64-linux-gnu
            linker_env: CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER
            linker: aarch64-linux-gnu-gcc
          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            rpm_arch: armv7hl
            archive: tar.gz
            apt_packages: gcc-arm-linux-gnueabihf
            linker_env: CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER
            linker: arm-linux-gnueabihf-gcc

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install cross linker
        if: matrix.apt_packages != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt_packages }}

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add "${{ matrix.target }}"

      - name: Install packaging tools
        run: |
          cargo install cargo-deb --locked
          cargo install cargo-generate-rpm --locked

      - name: Configure cross linker
        if: matrix.linker != ''
        run: echo "${{ matrix.linker_env }}=${{ matrix.linker }}" >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Package release artifacts
        shell: bash
        run: |
          set -euo pipefail

          package_name="${BINARY_NAME}-${GITHUB_REF_NAME}-${{ matrix.target }}"
          package_dir="dist/${package_name}"
          binary_path="target/${{ matrix.target }}/release/${BINARY_NAME}"

          mkdir -p "${package_dir}"
          cp "${binary_path}" "${package_dir}/"
          cp README.md "${package_dir}/"
          tar -C dist -czf "dist/${package_name}.tar.gz" "${package_name}"
          cargo deb --no-build --locked --target "${{ matrix.target }}" --output dist
          cargo generate-rpm --target "${{ matrix.target }}" --arch "${{ matrix.rpm_arch }}" --output dist

      - name: Upload packaged binary
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.deb
            dist/*.rpm
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Package example configs
        shell: bash
        run: |
          set -euo pipefail

          package_name="${BINARY_NAME}-${GITHUB_REF_NAME}-examples"
          package_dir="dist/${package_name}"

          mkdir -p "${package_dir}"
          cp -R examples "${package_dir}/"
          tar -C dist -czf "dist/${package_name}.tar.gz" "${package_name}"
          rm -rf "${package_dir}"

      - name: Show artifacts
        run: ls -lah dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
