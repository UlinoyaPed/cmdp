[categories.archive]
alias = "压缩解压"

[commands.tar_gz_create]
category = "archive"
title = "压缩为 tar.gz"
description = "使用 tar 创建 tar.gz 压缩包"
danger = false
template = '''
tar -czvf <<"{{output}}">> <<"{{path}}">>
'''

params = [
  { name = "output", label = "输出文件", placeholder = "archive.tar.gz", help = "输出压缩包路径；扩展名应和命令类型匹配" },
  { name = "path", label = "要压缩的文件或目录", default = ".", placeholder = ".", help = "填 . 表示当前目录；路径会作为一个参数传给压缩命令" },
]

[commands.tar_extract]
category = "archive"
title = "解压 tar 包"
description = "解压 tar、tar.gz、tar.bz2、tar.xz 等归档文件"
danger = false
template = '''
tar -xvf <<"{{archive}}">> [[directory:-C "{{directory}}"]]
'''

params = [
  { name = "archive", label = "压缩包路径", placeholder = "archive.tar.gz", help = "要解压的 tar/tar.gz 压缩包路径" },
  { name = "directory", label = "解压到目录", placeholder = "./output", help = "启用指定目录选项后传给解压命令；目录可不存在" },
]

options = [
  { id = "directory", label = "指定解压目录", default_enabled = false },
]

[commands.zip_create]
category = "archive"
title = "压缩为 zip"
description = "使用 zip 创建 zip 压缩包"
danger = false
template = '''
zip [[recursive:-r]] <<"{{output}}">> <<"{{path}}">>
'''

params = [
  { name = "output", label = "输出文件", placeholder = "archive.zip", help = "输出 zip 文件路径，父目录需要可写" },
  { name = "path", label = "要压缩的文件或目录", default = ".", placeholder = ".", help = "填 . 表示当前目录；路径会作为一个参数传给压缩命令" },
]

options = [
  { id = "recursive", label = "递归目录 -r", default_enabled = true },
]

[commands.unzip_file]
category = "archive"
title = "解压 zip"
description = "使用 unzip 解压 zip 文件"
danger = false
template = '''
unzip <<"{{archive}}">> [[directory:-d "{{directory}}"]]
'''

params = [
  { name = "archive", label = "zip 文件", placeholder = "archive.zip", help = "要解压的 zip 文件路径" },
  { name = "directory", label = "解压到目录", placeholder = "./output", help = "启用指定目录选项后传给解压命令；目录可不存在" },
]

options = [
  { id = "directory", label = "指定解压目录", default_enabled = false },
]
