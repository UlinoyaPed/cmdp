version = 1

[categories.file]
alias = "文件管理"

[categories.dev]
alias = "开发工具"

[categories.media]
alias = "媒体处理"

[commands.find_large]
category = "file"
title = "查找大文件"
description = "查找指定目录下超过给定大小的文件"
danger = false
template = '''
find <<{{path}}>> -type f [[size:-size +{{size}}]] [[name:-name "{{pattern}}"]] -printf '%s\t%p\n' | sort -nr | numfmt --field=1 --to=iec
'''
params = [
  { name = "path", label = "搜索路径", default = ".", placeholder = "." },
  { name = "size", label = "大小阈值", default = "1G", placeholder = "1G" },
  { name = "pattern", label = "文件名匹配", placeholder = "*.log" },
]
options = [
  { id = "size", label = "启用大小过滤", default_enabled = true },
  { id = "name", label = "启用文件名匹配", default_enabled = false },
]

[commands.rg]
category = "file"
title = "Ripgrep 搜索"
description = "使用 rg 搜索文本"
danger = false
template = '''
rg [[ignore_case:-i]] [[line_number:-n]] [[glob:--glob "{{glob}}"]] <<{{query}}>> <<{{path}}>>
'''
params = [
  { name = "query", label = "搜索内容" },
  { name = "path", label = "搜索路径", default = "." },
  { name = "glob", label = "Glob 过滤", placeholder = "*.rs" },
]
options = [
  { id = "ignore_case", label = "忽略大小写", default_enabled = false },
  { id = "line_number", label = "显示行号", default_enabled = true },
  { id = "glob", label = "启用 Glob 过滤", default_enabled = false },
]

[commands.cargo_check]
category = "dev"
title = "Cargo Check"
description = "在指定目录运行 cargo check"
danger = false
template = '''
cd <<{{project}}>> && cargo check [[all_targets:--all-targets]] [[features:--features {{features}}]]
'''
params = [
  { name = "project", label = "项目目录", default = "." },
  { name = "features", label = "Features", placeholder = "serde,cli" },
]
options = [
  { id = "all_targets", label = "检查所有 target", default_enabled = false },
  { id = "features", label = "启用 features", default_enabled = false },
]

[commands.clean_venv]
category = "file"
title = "删除 .venv 目录"
description = "删除指定路径下所有 .venv 目录"
danger = true
template = '''
find <<{{path}}>> -type d -name .venv -prune [[print:-print]] -exec rm -rf {} +
'''
params = [
  { name = "path", label = "搜索路径", default = "." },
]
options = [
  { id = "print", label = "删除前打印匹配目录", default_enabled = true },
]
