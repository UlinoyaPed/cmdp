[categories.package]
alias = "软件包管理"

[commands.dnf_update]
category = "package"
title = "DNF 更新系统"
description = "Fedora 使用 dnf 更新系统软件包"
danger = false
template = '''
sudo dnf update
'''

[commands.dnf_install]
category = "package"
title = "DNF 安装软件"
description = "Fedora 使用 dnf 安装软件包"
danger = false
template = '''
sudo dnf install <<"{{package}}">>
'''

params = [
  { name = "package", label = "软件包名", placeholder = "git", help = "填写 dnf 能识别的包名，例如 ripgrep；不是应用商店里的显示名" },
]

[commands.dnf_remove]
category = "package"
title = "DNF 卸载软件"
description = "Fedora 使用 dnf 卸载软件包"
danger = true
template = '''
sudo dnf remove <<"{{package}}">>
'''

params = [
  { name = "package", label = "软件包名", placeholder = "package-name", help = "将被传给 dnf remove，确认是要卸载的包名" },
]

[commands.dnf_search]
category = "package"
title = "DNF 搜索软件"
description = "Fedora 使用 dnf 搜索软件包"
danger = false
template = '''
dnf search <<"{{keyword}}">>
'''

params = [
  { name = "keyword", label = "关键词", placeholder = "telegram", help = "用于 dnf search，会匹配包名和描述" },
]
